<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Admin • Alumni Nexus</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./css/style.css" />
	<link rel="stylesheet" href="./css/navbar.css" />
	<link rel="stylesheet" href="./css/admin.css" />
</head>
<body>
	<header id="app-navbar" data-include="navbar.html"></header>
	<main class="container section">
		<h1>Admin Dashboard</h1>
		<div class="grid grid-4 stats">
			<div class="card"><h4>Total Alumni</h4><div class="num">2,430</div></div>
			<div class="card"><h4>Events</h4><div class="num">18</div></div>
			<div class="card"><h4>Donations</h4><div class="num">$84k</div></div>
			<div class="card"><h4>Active Users</h4><div class="num">312</div></div>
		</div>
		<div class="card" style="margin-top:1rem">
			<canvas id="trafficChart" height="120"></canvas>
		</div>
		<div class="card" style="margin-top:1rem">
			<div style="display:flex;justify-content:space-between;align-items:center">
				<h3>Alumni List</h3>
				<button class="btn btn--primary">Export Report</button>
			</div>
			<div class="table__wrap">
				<table class="table">
					<thead><tr><th>Name</th><th>Dept</th><th>Year</th><th>Role</th></tr></thead>
					<tbody>
						<tr><td>Aisha Khan</td><td>CS</td><td>2023</td><td>Engineer</td></tr>
						<tr><td>Rahul Mehta</td><td>EE</td><td>2022</td><td>Manager</td></tr>
						<tr><td>Grace Kim</td><td>CS</td><td>2018</td><td>ML Engineer</td></tr>
					</tbody>
				</table>
			</div>
		</div>
	</main>
	<footer id="app-footer" data-include="footer.html"></footer>
	<button id="scrollTop" aria-label="Scroll to top">↑</button>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="./js/main.js"></script>
	<script src="./js/admin.js"></script>
</body>
</html>
