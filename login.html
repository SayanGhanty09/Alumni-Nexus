<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login • Alumni Nexus</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./css/style.css" />
	<link rel="stylesheet" href="./css/navbar.css" />
	<style>
		.auth{padding:4rem 0}
		.auth__card{max-width:560px;margin:0 auto}
		.tabs{display:flex;gap:.6rem;margin-bottom:1rem}
		.tabs button{padding:.6rem .9rem;border-radius:10px;border:1px solid var(--border);background:var(--panel);color:var(--text);cursor:pointer}
		.tabs button.active{background:var(--primary);color:#0b0d10;border-color:transparent}
		.form{display:grid;gap:.8rem}
		.input{padding:.7rem .8rem;border-radius:10px;border:1px solid var(--border);background:#0c1015;color:var(--text)}
	</style>
</head>
<body>
	<header id="app-navbar" data-include="navbar.html"></header>
	<main class="auth container">
		<div class="card auth__card">
			<div class="tabs">
				<button id="tabLogin" class="active">Login</button>
				<button id="tabRegister">Register</button>
			</div>
			<form id="loginForm" class="form">
				<input class="input" type="email" placeholder="Email" required>
				<input class="input" type="password" placeholder="Password" required>
				<button class="btn btn--primary" type="submit">Login</button>
			</form>
			<form id="registerForm" class="form hide">
				<input class="input" type="text" placeholder="Full Name" required>
				<input class="input" type="email" placeholder="Email" required>
				<input class="input" type="password" placeholder="Password" required>
				<button class="btn btn--primary" type="submit">Create Account</button>
			</form>
			<p class="muted" id="authMsg"></p>
		</div>
	</main>
	<footer id="app-footer" data-include="footer.html"></footer>
	<button id="scrollTop" aria-label="Scroll to top">↑</button>
	<script src="./js/main.js"></script>
	<script>
		const loginForm=document.getElementById('loginForm');
		const registerForm=document.getElementById('registerForm');
		const tabLogin=document.getElementById('tabLogin');
		const tabRegister=document.getElementById('tabRegister');
		const msg=document.getElementById('authMsg');
		tabLogin.addEventListener('click',()=>{
			loginForm.classList.remove('hide');
			registerForm.classList.add('hide');
			tabLogin.classList.add('active');
			tabRegister.classList.remove('active');
		});
		tabRegister.addEventListener('click',()=>{
			registerForm.classList.remove('hide');
			loginForm.classList.add('hide');
			tabRegister.classList.add('active');
			tabLogin.classList.remove('active');
		});
		loginForm.addEventListener('submit',e=>{e.preventDefault();msg.textContent='Logged in (demo). Redirecting to dashboard...';setTimeout(()=>location.href='dashboard.html',700)});
		registerForm.addEventListener('submit',e=>{e.preventDefault();msg.textContent='Account created (demo). Redirecting to dashboard...';setTimeout(()=>location.href='dashboard.html',900)});
	</script>
</body>
</html>
