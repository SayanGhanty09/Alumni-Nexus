<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Dashboard • Alumni Nexus</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./css/style.css" />
	<link rel="stylesheet" href="./css/navbar.css" />
	<link rel="stylesheet" href="./css/dashboard.css" />
</head>
<body>
	<header id="app-navbar" data-include="navbar.html"></header>
	<main class="container section">
		<h1>Welcome back!</h1>
		<div class="grid grid-3">
			<div class="card stat"><h3>Connections</h3><div class="num">128</div></div>
			<div class="card stat"><h3>Events Registered</h3><div class="num">3</div></div>
			<div class="card stat"><h3>Donations</h3><div class="num">$250</div></div>
		</div>
		<div class="grid grid-3" style="margin-top:1rem">
			<a class="card linkcard" href="directory.html"><h3>Find Alumni</h3><p class="muted">Search and filter the directory</p></a>
			<a class="card linkcard" href="events.html"><h3>Upcoming Events</h3><p class="muted">Register in one click</p></a>
			<a class="card linkcard" href="mentorship.html"><h3>Mentorship</h3><p class="muted">Get matched with mentors</p></a>
		</div>
	</main>
	<footer id="app-footer" data-include="footer.html"></footer>
	<button id="scrollTop" aria-label="Scroll to top">↑</button>
	<script src="./js/main.js"></script>
</body>
</html>
