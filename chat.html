<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Community • Alumni Nexus</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./css/style.css" />
	<link rel="stylesheet" href="./css/navbar.css" />
	<link rel="stylesheet" href="./css/chat.css" />
</head>
<body>
	<header id="app-navbar" data-include="navbar.html"></header>
	<main class="container section">
		<h1>Community Chat</h1>
		<div class="card">
			<ul id="messages" class="chat__list"></ul>
			<form id="chatForm" class="chat__form">
				<input id="chatInput" class="input" placeholder="Write a message..." />
				<button class="btn btn--primary">Send</button>
			</form>
		</div>
	</main>
	<footer id="app-footer" data-include="footer.html"></footer>
	<button id="scrollTop" aria-label="Scroll to top">↑</button>
	<script src="./js/main.js"></script>
	<script src="./js/chat.js"></script>
</body>
</html>
